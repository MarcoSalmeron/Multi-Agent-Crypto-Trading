<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Currency Dashboard</title>

  <!-- Plotly CDN -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header>
  <div class="logo"><svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" fill="currentColor" class="bi bi-graph-up-arrow" viewBox="0 0 16 16">
  <path fill-rule="evenodd" d="M0 0h1v15h15v1H0zm10 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 .5.5v4a.5.5 0 0 1-1 0V4.9l-3.613 4.417a.5.5 0 0 1-.74.037L7.06 6.767l-3.656 5.027a.5.5 0 0 1-.808-.588l4-5.5a.5.5 0 0 1 .758-.06l2.609 2.61L13.445 4H10.5a.5.5 0 0 1-.5-.5"/>
</svg> Cryptol<span>Live currency</span></div>

  <div class="controls">
    <label>Crypto</label>
    <select id="inputSymbol">
      <option value="btcusdt" {% if symbol =='BTCUSDT' %}selected{% endif %}>₿ Bitcoin (BTCUSDT)</option>
      <option value="ethusdt" {% if symbol =='ETHUSDT' %}selected{% endif %}>⟠ Ethereum (ETHUSDT)</option>
    </select>

    <label>Intervalo</label>
    <select id="inputInterval">
      {% set intervals = ["1s","1m","3m","5m","15m","30m","1h","2h","4h","6h","8h","12h","1d","3d","1w","1M"] %}
      {% for iv in intervals %}
        <option value="{{ iv }}" {% if iv == interval %}selected{% endif %}>{{ iv }}</option>
      {% endfor %}
    </select>

    <button class="btn" id="btnApply" onclick="applyChange()">Aplicar</button>
  </div>
</header>

<!-- ── Status bar ──────────────────────────────────────────────────── -->
<div class="statusbar">
  <div class="stat">
    <div id="statusDot"></div>
    <span id="statusText" style="color:var(--muted)">Conectando…</span>
  </div>
  <div class="stat">
    <span class="stat-label">Símbolo:</span>
    <span id="statSymbol" style="font-weight:700;color:var(--accent)">{{ symbol }}</span>
  </div>
  <div class="stat">
    <span class="stat-label">Último cierre:</span>
    <span id="lastClose">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Velas:</span>
    <span id="statCount">0</span>
  </div>
  <div class="stat">
    <span class="stat-label">Intervalo:</span>
    <span id="statInterval">{{ interval }}</span>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────────────── -->
<main>
  <div id="chart"></div>

  <aside>
    <div class="side-section">
      <div class="side-title">Última vela</div>
      <div class="metric"><span class="metric-label">Apertura</span> <span class="metric-value" id="mOpen">—</span></div>
      <div class="metric"><span class="metric-label">Máximo</span>  <span class="metric-value" id="mHigh">—</span></div>
      <div class="metric"><span class="metric-label">Mínimo</span>  <span class="metric-value" id="mLow">—</span></div>
      <div class="metric"><span class="metric-label">Cierre</span>  <span class="metric-value" id="mClose">—</span></div>
      <div class="metric"><span class="metric-label">Volumen</span> <span class="metric-value" id="mVol">—</span></div>
    </div>

    <div class="side-title" style="padding:14px 20px 0;margin-bottom:0">Historial de velas</div>
    <div id="candleLog"></div>
  </aside>

  <div id="volumeChart"></div>
</main>

 <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
</body>
</html>
